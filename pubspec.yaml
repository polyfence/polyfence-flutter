name: polyfence
description: "Privacy-first polygon and circle geofencing for Flutter. On-device processing, unlimited zones, activity-aware tracking."
version: 0.13.0
homepage: https://polyfence.io
repository: https://github.com/polyfence/polyfence-flutter
issue_tracker: https://github.com/polyfence/polyfence-flutter/issues

# Topics help with discoverability on pub.dev
topics:
  - geofencing
  - location
  - gps
  - background
  - privacy

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0
  http: ^1.1.0
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  package_info_plus: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.polyfence.polyfence.flutter
        pluginClass: PolyfencePlugin
      ios:
        pluginClass: PolyfencePlugin
