name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for emojis in production code
        run: |
          if grep -rPn '[\x{1F600}-\x{1F64F}\x{1F300}-\x{1F5FF}\x{1F680}-\x{1F6FF}\x{1F1E0}-\x{1F1FF}\x{2702}-\x{27B0}\x{FE00}-\x{FE0F}\x{1F900}-\x{1F9FF}]' lib/ android/src/ ios/Classes/ 2>/dev/null; then
            echo "::error::Emojis found in production code"
            exit 1
          fi

      - name: Check for internal files
        run: |
          for file in CLAUDE.md .cursorrules; do
            if [ -f "$file" ] && git ls-files --error-unmatch "$file" 2>/dev/null; then
              echo "::error::Internal file $file is tracked in git"
              exit 1
            fi
          done
          if git ls-files | grep -q "^tasks/"; then
            echo "::error::tasks/ directory is tracked in git"
            exit 1
          fi
          if git ls-files | grep -q "^prompts/"; then
            echo "::error::prompts/ directory is tracked in git"
            exit 1
          fi
          if git ls-files | grep -q "^\\.claude/"; then
            echo "::error::.claude/ directory is tracked in git"
            exit 1
          fi

      - name: Check for secrets
        run: |
          if grep -rPn '(sk_live_|sk_test_|pk_live_|pk_test_|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|xoxb-|xoxp-)' --include="*.dart" --include="*.kt" --include="*.swift" --include="*.m" --include="*.yaml" --include="*.yml" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v ".gradle" | grep -v "pubspec.lock"; then
            echo "::error::Potential secrets found in code"
            exit 1
          fi

      - name: Check for internal references
        run: |
          if grep -rn "Teslon\|Sector7" --include="*.dart" --include="*.kt" --include="*.swift" --include="*.m" lib/ android/src/ ios/Classes/ 2>/dev/null; then
            echo "::error::Internal references found in production code"
            exit 1
          fi
