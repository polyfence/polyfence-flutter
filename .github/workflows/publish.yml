name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-version-sync:
    name: Validate Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract and validate versions match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PUBSPEC_VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}')
          echo "Tag version:     $TAG_VERSION"
          echo "pubspec version: $PUBSPEC_VERSION"
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pubspec.yaml version ($PUBSPEC_VERSION). If pubspec has a +N build suffix, the tag must include it (e.g. v0.14.0+1)."
            exit 1
          fi
          echo "Versions match: $TAG_VERSION"

  validate-code:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  publish-pub:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    needs: [validate-version-sync, validate-code]
    permissions:
      # GitHub Actions: declaring ANY explicit permissions implicitly sets all
      # others to `none`. Without `contents: read`, `actions/checkout` fails
      # with "Repository not found" (this killed v0.14.0 and v0.14.1 publish
      # attempts). `id-token: write` is required by pub.dev's OIDC exchange.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Publish
        run: flutter pub publish --force

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pub]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
