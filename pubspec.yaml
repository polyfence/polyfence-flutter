name: polyfence
description: Privacy-first polygon and circle geofencing for Flutter. True background tracking without external dependencies.
version: 0.12.4
homepage: https://polyfence.io
repository: https://github.com/blackabass/polyfence-plugin
issue_tracker: https://github.com/blackabass/polyfence-plugin/issues

# Topics help with discoverability on pub.dev
topics:
  - geofencing
  - location
  - gps
  - background
  - privacy

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0
  http: ^1.1.0
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  package_info_plus: ^4.2.0
  battery_plus: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.polyfence.polyfence.flutter
        pluginClass: PolyfencePlugin
      ios:
        pluginClass: PolyfencePlugin
