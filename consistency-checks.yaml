# Phase 3 declarative drift checks — polyfence-flutter
checks:
  - id: bootstrap-files-not-tracked
    description: CLAUDE.md, .cursorrules, tasks/, prompts/, .claude/ must never be tracked
    type: subprocess
    runs: bash scripts/consistency-bootstrap-not-tracked.sh
    fix: Untrack forbidden scaffold paths — git rm --cached — keep them machine-local only.

  - id: pubspec-readme-version-sync
    description: pubspec.yaml semver matches sentinel occurrences in README and doc/TELEMETRY.md
    type: subprocess
    runs: bash scripts/consistency-pubspec-readme-version.sh
    fix: Bump the README sentinels and doc/TELEMETRY.md whenever pubspec.yaml version changes.

  - id: android-gradle-version-sync
    description: android/build.gradle plugin version matches pubspec.yaml version (AAR metadata stays consistent across releases)
    type: subprocess
    runs: bash scripts/consistency-android-gradle-version.sh
    fix: Run scripts/sync_version.sh to propagate pubspec.yaml version to android/build.gradle.

  - id: dart-analyze-clean
    description: Flutter analyzer reports zero errors on plugin surfaces (infos tolerated via project precedent)
    type: subprocess
    runs: flutter analyze lib android ios example --no-fatal-infos
    fix: Run flutter analyze and resolve failures until clean — mirror CI/pre-push expectations.

  - id: readme-cites-brand-positioning
    description: README carries canonical positioning anchor
    type: regex-presence
    files:
      - README.md
    pattern: "(BRAND_POSITIONING\\.md|geofence layer)"
    fix: Restore the canonical positioning paragraph in README ("geofence layer" framing).

  - id: privacy-md-links-telemetry-doc
    description: PRIVACY.md links readers to doc/TELEMETRY.md for field-level detail
    type: regex-presence
    files:
      - PRIVACY.md
    pattern: "doc/TELEMETRY\\.md"
    fix: Restore the telemetry reference doc link in PRIVACY.md so SDK privacy and telemetry stay cross-linked.

  - id: privacy-md-zero-pii-headline
    description: PRIVACY.md carries the Role-1 canonical Zero PII headline (verbatim)
    type: regex-presence
    files:
      - PRIVACY.md
    pattern: "Zero PII about your end users"
    fix: Restore the verbatim "Zero PII about your end users" headline block in PRIVACY.md.

  - id: pubspec-description-geofencing
    description: pubspec.yaml description states the geofencing purpose (brand-adjacent clarity)
    type: regex-presence
    files:
      - pubspec.yaml
    pattern: "(?i)geofenc"
    fix: Ensure pubspec description mentions geofencing so package metadata matches README positioning.

  - id: no-internal-decision-ids
    description: internal decision-IDs (Dxxx) / job-codes (Jxx) must not appear in public docs or lib source
    type: subprocess
    runs: bash scripts/check-no-internal-ids.sh
    fix: strip the (Dxxx)/(Jxx) tokens from the offending public file — keep the reasoning. Internal IDs live only in polyfence-internal (DECISION_LOG / job tracker). See L213.
