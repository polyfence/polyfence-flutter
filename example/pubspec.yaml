name: polyfence_example
description: Example app for Polyfence plugin
publish_to: 'none'
version: 0.9.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  polyfence:
    path: ../
  cupertino_icons: ^1.0.2
  lucide_icons: ^0.257.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.1
  # A1-A3: Removed unused dependencies (sensors_plus, battery_plus, path_provider)
  # These were declared but never imported - potential background listener overhead

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
