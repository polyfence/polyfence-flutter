name: polyfence_example
description: Example app for the Polyfence Flutter SDK.
publish_to: 'none'
version: 2.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Plugin under development — points at the parent directory so PRs to
  # the plugin can be exercised in this example without publishing.
  polyfence:
    path: ../
  cupertino_icons: ^1.0.2
  # lucide_icons (the original) has been unmaintained since 2023-06
  # and does not build against Flutter versions where IconData is now a
  # final class. lucide_icons_flutter is the actively-maintained fork
  # with the same LucideIcons.<name> surface.
  lucide_icons_flutter: ^3.1.15
  http: ^1.1.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.1
  # Map tab uses OSM raster tiles via flutter_map; latlong2 is its
  # required companion type for marker coordinates.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Space Grotesk (brand typography) loaded at runtime via google_fonts.
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
