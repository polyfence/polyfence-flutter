name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: I need to detect when a user dwells in a zone for more than 5 minutes...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: Add a `dwellTime` parameter to Zone configuration...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions have you considered?
      placeholder: I tried implementing this with timers, but...

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe your specific use case
      placeholder: I'm building a delivery app where drivers need to stay in zones for at least 5 minutes...

  - type: dropdown
    id: scope
    attributes:
      label: Feature Scope
      description: Where should this feature live?
      options:
        - Flutter plugin (core geofencing)
        - polyfence.io SaaS (zone management/analytics)
        - Example app (demonstration)
        - Documentation
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues/PRs to avoid duplicates
          required: true
        - label: This feature aligns with Polyfence's privacy-first philosophy
          required: true
        - label: I am willing to help implement this feature
          required: false
